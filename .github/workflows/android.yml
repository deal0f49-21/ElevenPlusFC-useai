name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Use Java 17 (required for Gradle + Compose)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache Gradle dependencies for faster builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Run build
      - name: Build project
        run: ./gradlew clean assembleDebug bundleRelease --no-daemon

      # Upload build artifacts
      - name: Upload .APK and .AAB
        uses: actions/upload-artifact@v4
        with:
          name: ElevenPlusFC-builds
          path: |
            app/build/outputs/apk/debug/**/*.apk
            app/build/outputs/bundle/release/**/*.aab
